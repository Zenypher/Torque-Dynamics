version: "3.8"

services:
  # Medusa Backend
  medusa:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: torque-backend
    environment:
      ADMIN_PATH: /app
      VITE_DEV_PORT: 5173
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      STORE_CORS: ${STORE_CORS:-http://localhost:8000,http://localhost:3000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:5173,http://localhost:9000}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:5173,http://localhost:9000}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change}
      COOKIE_SECRET: ${COOKIE_SECRET:-your-cookie-secret-change}
      MEILISEARCH_HOST: ${MEILISEARCH_HOST}
      MEILISEARCH_API_KEY: ${MEILISEARCH_API_KEY}
      MEILISEARCH_PRODUCT_INDEX_NAME: ${MEILISEARCH_PRODUCT_INDEX_NAME:-products}
      MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://localhost:9000}
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FILE_URL: ${S3_FILE_URL}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      DISABLE_MEDUSA_ADMIN: ${DISABLE_MEDUSA_ADMIN:-false}
      SENTRY_DSN: ${SENTRY_DSN}
    ports:
      - "9000:9000"
      - "7001:7001"
      - "5173:5173"
    volumes:
      - ./backend/src:/app/src
      - ./backend/.medusa:/app/.medusa
    restart: unless-stopped

  # Next.js Storefront
  storefront:
    build:
      context: ./storefront
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
        NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
        NEXT_PUBLIC_MEILISEARCH_HOST: ${NEXT_PUBLIC_MEILISEARCH_HOST}
        NEXT_PUBLIC_MEILISEARCH_API_KEY: ${NEXT_PUBLIC_MEILISEARCH_API_KEY}
        NEXT_PUBLIC_MEILISEARCH_INDEX_NAME: ${NEXT_PUBLIC_MEILISEARCH_INDEX_NAME:-products}
        MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL:-http://medusa:9000}
    container_name: torque-storefront
    depends_on:
      - medusa
    environment:
      NODE_ENV: development
      MEDUSA_BACKEND_URL: http://medusa:9000
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
      NEXT_PUBLIC_STRIPE_KEY: ${NEXT_PUBLIC_STRIPE_KEY}
      NEXT_PUBLIC_MEILISEARCH_HOST: ${NEXT_PUBLIC_MEILISEARCH_HOST}
      NEXT_PUBLIC_MEILISEARCH_API_KEY: ${NEXT_PUBLIC_MEILISEARCH_API_KEY}
      NEXT_PUBLIC_MEILISEARCH_INDEX_NAME: ${NEXT_PUBLIC_MEILISEARCH_INDEX_NAME:-products}
      NEST_PUBLIC_MEDUSA_BACKEND_URL: http//localhost:9000
    ports:
      - "8000:8000"
    volumes:
      - ./storefront/src:/app/src
      - ./storefront/public:/app/public
    restart: unless-stopped
